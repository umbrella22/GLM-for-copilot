name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Verify and package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm test

      - run: rm -rf dist && mkdir -p dist && pnpm package

      - name: Upload packaged VSIX
        uses: actions/upload-artifact@v7
        with:
          name: glm-for-copilot-vsix
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 30

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    needs: [package, release]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: publish-${{ needs.release.outputs.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Download packaged VSIX
        uses: actions/download-artifact@v7
        with:
          name: glm-for-copilot-vsix
          path: dist

      - name: Locate VSIX
        id: vsix
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/*.vsix)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one VSIX in dist, found ${#files[@]}" >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        if: vars.PUBLISH_VSCODE_MARKETPLACE != 'false'
        run: pnpm exec vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: vars.PUBLISH_OPEN_VSX != 'false'
        run: pnpm exec ovsx publish --skip-duplicate "${{ steps.vsix.outputs.path }}"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: ${{ steps.vsix.outputs.path }}
          fail_on_unmatched_files: true

      - name: Show release info
        run: |
          echo "Released ${{ needs.release.outputs.tag_name }}"
