name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm compile

      - run: mkdir -p dist && pnpm package

      - uses: actions/upload-artifact@v4
        with:
          name: glm-for-copilot.vsix
          path: dist/*.vsix
          retention-days: 30
